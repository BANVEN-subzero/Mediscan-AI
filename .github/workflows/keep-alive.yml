name: Keep MediScan AI Backend Awake

on:
  schedule:
    # This triggers a cron job every 14 minutes, 24/7
    - cron: '*/14 * * * *'
  workflow_dispatch:  # Allows manual triggering for testing

jobs:
  ping-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Web Service
        run: |
          echo "Pinging backend..."
          curl -f -X GET https://mediscan-ai-2-by4n.onrender.com/health
          echo ""
          echo "Done"
